<!DOCTYPE html>
<html>
  <head>
    <base href="$FLUTTER_BASE_HREF">
    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="Camellia Web Client">
    <meta name="theme-color" content="#D6455D">
    <meta name="color-scheme" content="only light">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Camellia">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <title>Camellia Web Client</title>
    <style>
      :root {
        --camellia-rose: #d6455d;
        --camellia-rose-dark: #b83b4f;
        --camellia-cream: #fff7f2;
        --camellia-ink: #1f1b1e;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        background: radial-gradient(circle at 20% 10%, #ffe9ed 0%, #fff7f2 40%, #f6f1ed 100%);
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        color: var(--camellia-ink);
      }
      #loading .mark {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--camellia-rose), var(--camellia-rose-dark));
        display: grid;
        place-items: center;
        color: #fff;
        font-weight: 700;
        font-size: 24px;
        box-shadow: 0 12px 24px rgba(214, 69, 93, 0.35);
      }
      #loading .pulse {
        width: 90px;
        height: 4px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(214, 69, 93, 0.18);
        position: relative;
      }
      #loading .pulse::after {
        content: "";
        position: absolute;
        inset: 0;
        transform: translateX(-70%);
        background: linear-gradient(90deg, transparent, rgba(214, 69, 93, 0.75), transparent);
        animation: slide 1.5s infinite;
      }
      @keyframes slide {
        0% {
          transform: translateX(-70%);
        }
        100% {
          transform: translateX(70%);
        }
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="mark">C</div>
      <div>Preparing Camellia Web Client...</div>
      <div class="pulse" aria-hidden="true"></div>
    </div>
    <noscript>Camellia Web Client requires JavaScript to run.</noscript>
    <script>
      window.__CAMELLIA_WEB__ = window.__CAMELLIA_WEB__ || {
        appName: "Camellia",
        version: "",
        buildDate: "",
        apiServer: "",
        isPublicServer: true
      };
      function removeLoading() {
        var loader = document.getElementById("loading");
        if (loader) {
          loader.remove();
        }
      }
      window.addEventListener("flutter-first-frame", removeLoading);
      window.addEventListener("load", function () {
        window.setTimeout(removeLoading, 8000);
      });
    </script>
    <script type="module" src="js/dist/web_bridge.js"></script>
    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>
